version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: edusmart
      POSTGRES_PASSWORD: edusmart_password
      POSTGRES_DB: edusmart_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://edusmart:edusmart_password@db:5432/edusmart_db?schema=public
      - NODE_ENV=production
    depends_on:
      - db

volumes:
  pgdata:
